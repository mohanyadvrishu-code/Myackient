name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract source tar.gz
        run: |
          TARBALL=$(find . -maxdepth 2 -name "*.tar.gz" | head -1)
          if [ -n "$TARBALL" ]; then
            echo "Found tarball: $TARBALL"
            tar -xzf "$TARBALL"
            EXTRACTED=$(tar -tzf "$TARBALL" | head -1 | cut -f1 -d"/")
            echo "Extracted to: $EXTRACTED"
            if [ -d "$EXTRACTED" ]; then
              cp -r "$EXTRACTED/." .
              rm -rf "$EXTRACTED"
            fi
          else
            echo "No tar.gz found, using repo source directly"
          fi
          ls -la

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Xmx4096m -Dkotlin.daemon.jvm.options=-Xmx4096m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WClient-Release-APK
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30
