name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Find and prepare source
        run: |
          if [ -f "settings.gradle.kts" ] || [ -f "settings.gradle" ]; then
            echo "Source already in root"
            exit 0
          fi
          SETTINGS=$(find . -maxdepth 4 \( -name "settings.gradle.kts" -o -name "settings.gradle" \) | head -1)
          if [ -n "$SETTINGS" ]; then
            cp -r "$(dirname $SETTINGS)/." .
            exit 0
          fi
          ARCHIVE=$(find . -maxdepth 3 \( -name "*.tar.gz" -o -name "*.tar" \) | head -1)
          if [ -n "$ARCHIVE" ]; then
            tar -xf "$ARCHIVE"
            EXTRACTED=$(tar -tf "$ARCHIVE" | head -1 | cut -f1 -d"/")
            [ -d "$EXTRACTED" ] && cp -r "$EXTRACTED/." . && rm -rf "$EXTRACTED"
          fi

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: |
          [ ! -f gradlew ] && gradle wrapper --gradle-version=8.10.2
          chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease --no-daemon --warning-mode none
        env:
          GRADLE_OPTS: "-Xmx4096m -Dkotlin.daemon.jvm.options=-Xmx4096m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WClient-Release-APK
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30
