name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Find and extract tar.gz
        run: |
          TAR_FILE=$(find . -name "*.tar.gz" -o -name "*.tar" | grep -v ".git" | head -1)
          echo "Found: $TAR_FILE"
          tar -xf "$TAR_FILE"
          EXTRACTED=$(find . -maxdepth 1 -mindepth 1 -type d | grep -v ".git" | head -1)
          echo "Extracted to: $EXTRACTED"
          echo "PROJ_DIR=$EXTRACTED" >> $GITHUB_ENV

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Release APK
        working-directory: ${{ env.PROJ_DIR }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WClient-Release-APK
          path: ${{ env.PROJ_DIR }}/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
