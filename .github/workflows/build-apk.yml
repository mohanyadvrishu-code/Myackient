name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract ZIP
        run: unzip -o NinjaClient.zip || true
      - name: Set project dir
        run: |
          if [ -d "NinjaClient" ]; then
            echo "PROJECT_DIR=NinjaClient" >> $GITHUB_ENV
          else
            echo "PROJECT_DIR=." >> $GITHUB_ENV
          fi
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - run: chmod +x ${{ env.PROJECT_DIR }}/gradlew
      - run: cd ${{ env.PROJECT_DIR }} && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: NinjaClient-APK
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/app-debug.apk
