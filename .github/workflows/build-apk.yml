name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract ZIP
        run: |
          for z in *.zip; do
            echo "Extracting $z..."
            unzip -o "$z" || true
          done
          echo "=== Files after extract ==="
          find . -name "gradlew" 2>/dev/null || echo "gradlew not found"

      - name: Find gradlew
        run: |
          GW=$(find . -name "gradlew" -not -path "*/.git/*" | head -1)
          echo "gradlew found at: $GW"
          echo "PROJECT_DIR=$(dirname $GW)" >> $GITHUB_ENV

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd "${{ env.PROJECT_DIR }}"
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: NinjaClient-APK
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/app-debug.apk
